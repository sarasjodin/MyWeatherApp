<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/axios@1.14.0/dist/axios.min.js"
      integrity="sha384-m2u5cgG8qPGC3gLCJr4r4iceyLJ2C31DjoUkM8Cssb1EjYu/iiQC3HCOgkaxTApf"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="src/style.css" />
    <link rel="icon" href="favicon.ico" />
    <title>My Bootstrap Weather App | ClimaSense</title>
  </head>

  <body>
    <div class="page-wrapper">
      <header>
        <div class="container">
          <a href="index.html" class="text-decoration-none text-reset">
            <div class="row align-items-center">
              <div class="col-auto">
                <img
                  class="logo"
                  src="src/images/logo_myweatherapp.svg"
                  width="55"
                  height="55"
                  alt="The weather logo"
                />
              </div>
              <div class="col">
                <h1 class="logo-text my-custom-font">
                  ClimaSense - a weather app
                </h1>
              </div>
            </div>
          </a>
        </div>
        <div class="row">
          <div class="col d-flex justify-content-start">
            <button type="button" id="light-theme-button" class="btn btn-light">
              Light theme
            </button>
          </div>
          <div class="col d-flex justify-content-center">
            <button
              type="button"
              id="creative-theme-button"
              class="btn btn-light"
            >
              Creative theme
            </button>
          </div>
          <div class="col d-flex justify-content-end">
            <button type="button" id="dark-theme-button" class="btn btn-light">
              Dark theme
            </button>
          </div>
        </div>
      </header>
      <main class="app-container">
        <form class="container search-bar">
          <div class="row">
            <div class="col">
              <div class="d-flex">
                <input
                  type="text"
                  id="search-input"
                  class="form-control flex-grow-1"
                  placeholder="Enter a city name"
                />
                <button type="submit" class="btn btn-light submit">
                  Search
                </button>
              </div>
            </div>
          </div>
        </form>
        <section>
          <h2 class="visually-hidden">Current weather</h2>
          <div class="container">
            <div class="row">
              <div class="col-6 text-end">
                <span id="weather-icon"></span>
              </div>
              <div class="d-flex col-6">
                <span class="currenttemp" id="temperature"></span>
                <a class="active current-temp-units" id="celsius-link" href="#"
                  >°C</a
                >
                <span class="current-temp-units">|</span>
                <a class="current-temp-units" id="fahrenheit-link" href="#"
                  >°F</a
                >
              </div>
            </div>
          </div>
        </section>
        <section class="current-search-details">
          <h2 class="visually-hidden">Current search details</h2>
          <div class="container text-left">
            <div class="row align-items-end">
              <div class="col-7">
                <h2 id="city">Loading...</h2>
                <h2 id="date">Loading...</h2>
                <h2 id="description">Loading...</h2>
              </div>
              <div class="col-5">
                <p>
                  <span class="highlight">Precipitation: </span
                  ><span id="precipitation"></span>%<br /><span
                    class="highlight"
                    >Humidity: </span
                  ><span id="humidity"></span>%<br /><span class="highlight"
                    >Wind: </span
                  ><span id="wind"></span> km/h
                </p>
              </div>
            </div>
          </div>
        </section>
        <section id="forecast" class="container text-center forecast">
          <h2 class="visually-hidden">Weather forecast</h2>
        </section>
      </main>
      <footer>
        <div class="container text-left custom-container">
          <div class="row">
            <div class="col">
              <a
                href="https://github.com/sarasjodin/MyWeatherApp"
                target="_blank"
                rel="noopener noreferrer"
                >Coded by</a
              >
              <a
                href="https://www.sarasjodin.com/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  class="small-logo"
                  src="src/images/logo_sarasjodincom.svg"
                  alt="Logo sarasjodin.com"
                />
              </a>
            </div>
            <div class="col d-flex justify-content-end">
              <nav style="--bs-breadcrumb-divider: ''" aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item active"><a href="#">Home</a></li>
                  <li class="breadcrumb-item">
                    <a href="about.html">About</a>
                  </li>
                  <li class="breadcrumb-item">
                    <a href="form.html">Feedback form</a>
                  </li>
                </ol>
              </nav>
            </div>
          </div>
        </div>
        <div class="container text-left">
          <div class="row">
            <div class="col d-flex flex-wrap justify-content-start">
              <a
                href="https://www.netlify.com"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="src/images/logo-netlify.png"
                  alt="Logo Netlify"
                  width="80"
                />
              </a>
              <p class="powered-by">
                <a
                  href="https://www.netlify.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Powered by Netlify</a
                >
              </p>
            </div>
          </div>
        </div>
      </footer>

      <script src="src/index.js"></script>
    </div>
  </body>
</html>
